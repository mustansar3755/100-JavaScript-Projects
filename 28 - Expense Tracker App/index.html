<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ledger - Expnse Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>The Ledger</h1>
        <div class="date" id="todayDate"></div>
      </header>
      <!-- Top Section -->
      <div class="balacne-row">
        <div class="balance-cell">
          <div class="label">Income</div>
          <div class="amt income" id="totalIncome">0</div>
        </div>
        <div class="balance-cell">
          <div class="label">Expense</div>
          <div class="amt expense" id="totalExpense">0</div>
        </div>
        <div class="balance-cell">
          <div class="label">Balance</div>
          <div class="amt total" id="totalBalance">0</div>
        </div>
      </div>
      <!-- Form -->
      <form id="entryForm">
        <div class="type-toggle">
          <button
            type="button"
            class="expense active"
            data-type="expense"
            id="btnExpense"
          >
            Expense
          </button>
          <button
            type="button"
            class="income"
            data-type="income"
            id="btnIncome"
          >
            Income
          </button>
        </div>
        <!-- Row 1 -->
        <div class="row">
          <div>
            <label for="title">Title</label>
            <input
              type="text"
              id="title"
              placeholder="e.g. Groceries"
              required
            />
          </div>
          <div>
            <label for="amount">Amount</label>
            <input
              type="number"
              id="amount"
              placeholder="0"
              min="0.01"
              step="0.01"
              required
            />
          </div>
        </div>
        <!-- Row 2 -->
        <div class="row">
          <div>
            <label for="category">Category</label>
            <select id="category">
              <option>Food</option>
              <option>Transport</option>
              <option>Bills</option>
              <option>Shopping</option>
              <option>Health</option>
              <option>Salary</option>
              <option>Other.</option>
            </select>
          </div>
          <div>
            <label for="entryDate">Date</label>
            <input type="date" id="entryDate" required />
          </div>
        </div>
        <!-- Button -->
        <button type="submit" class="submit-btn">Add Entry</button>
      </form>
      <!-- Entries -->
      <div class="ledger-head">
        <h2>Entries</h2>
        <div class="filters">
          <button data-filter="all" class="active">All</button>
          <button data-filter="income">Income</button>
          <button data-filter="expense">Expense</button>
        </div>
      </div>
      <!-- View Entries -->
      <div class="entries" id="entriesList"></div>
      <footer>Stored locally on the device.No data leaves your browser.</footer>
    </div>
    <!-- Script -->
    <script src="script.js"></script>
  </body>
</html>
